<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <!-- css -->
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="grid-container">
        <!-- header -->
        <header id="header">
            <div class="menu-icon" onclick="openSidebar()">
                <span class="material-symbols-outlined">menu</span>
            </div>
            <div class="header-right">
                <span class="material-symbols-outlined">notifications</span>
                <span class="material-symbols-outlined">mail</span>
                <span class="material-symbols-outlined">account_circle</span>
            </div>
        </header>
        <!-- sidebar -->
        <aside id="sidebar">
            <div class="sidebar-title">
                <div class="sidebar-brand">
                    <span class="material-symbols-outlined">shopping_cart</span> Story
                </div>
                <span class="material-symbols-outlined " onclick="closeSidebar()">close</span>
            </div>
            <ul class="sidebar-list">
                <li class="sidebar-list-item"><a href="#"><span class="material-symbols-outlined">dashboard</span>
                        Dashboard</a> </li>
                <li class="sidebar-list-item"><a href="./products.html"><span class="material-symbols-outlined">inventory_2</span>
                        Products</a></li>
                <li class="sidebar-list-item"><a href="./add-product.html"><span class="material-symbols-outlined">add</span> Add
                        Products</a></li>
                <li class="sidebar-list-item"><a href="./users.html"><span class="material-symbols-outlined">groups</span> Users</a>
                </li>
            </ul>
        </aside>
        <!-- main -->
        <main id="main-container">
            <div id="error-message"></div>
            <div id="empty-message"></div>
            <h1>Dashboard</h1>
            <div id="loading" class="loading">
                <div class="points one"></div>
                <div class="points two"></div>
                <div class="points three"></div>
            </div>
            <div id="dashboard-content">
                <div class="main-cards">
                    <div class="card">
                        <div class="card-inner">
                            <h3>Orders</h3>
                            <span class="material-symbols-outlined">inventory_2</span>
                        </div>
                        <h2 id="orders-count">Loading...</h2>
                    </div>
                    <div class="card">
                        <div class="card-inner">
                            <h3>Users</h3>
                            <span class="material-symbols-outlined">group</span>
                        </div>
                        <h2 id="users-count">Loading...</h2>
                    </div>
                    <div class="card">
                        <div class="card-inner">
                            <h3>Revenue</h3>
                            <span class="material-symbols-outlined">attach_money</span>
                        </div>
                        <h2 id="revenue-count">Loading...</h2>
                    </div>
                </div>
                <!-- charts  -->
                <div class="charts">
                    <div class="users">
                        <h2>Users</h2>
                        <canvas id="users-chart"></canvas>
                    </div>
                    <div class="orders">
                        <h2>Orders & Revenue</h2>
                        <canvas id="orders-chart"></canvas>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/dashboard.js"></script>
</body>

</html>
